<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GameAssetHub</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">
    <nav class="bg-white shadow p-4 flex justify-between">
        <h1 class="text-2xl font-bold">GameAssetHub</h1>
        <div>
            <a href="/" class="text-blue-600 hover:underline">Home</a>
            {% if user.is_authenticated %}
                <span class="ml-4">Hello, {{ user.username }}</span>
            {% else %}
                <a href="/admin/login/" class="ml-4 text-blue-600 hover:underline">Login</a>
            {% endif %}
        </div>
    </nav>
    <div class="p-6">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
