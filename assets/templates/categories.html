{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - GameAssetHub</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="/" class="logo">GameAssetHub</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/categories/">Categories</a></li>
                    <li><a href="/about/">About</a></li>
                    <li><a href="/contact/">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="categories">
            <div class="container">
                <h1>Categories</h1>
                <ul class="category-list">
                    {% for category in categories %}
                        <li><a href="#">{{ category.name }}</a></li>
                    {% endfor %}
                </ul>
            </div>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2023 GameAssetHub. All rights reserved by GRANDFLEET.</p>
        </div>
    </footer>
</body>
</html>
