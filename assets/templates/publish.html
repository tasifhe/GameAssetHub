{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish - GameAssetHub</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a href="/" class="logo">GameAssetHub</a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/categories/">Categories</a></li>
                    <li><a href="/mylibrary/">My Library</a></li>
                    <li><a href="/publish/">Publish</a></li>
                    <li><a href="/community/">Community</a></li>
                    <li><a href="/about/">About</a></li>
                    <li><a href="/contact/">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="publish">
            <div class="container">
                <h1>Publish Your Assets</h1>
                <form action="#" method="post" enctype="multipart/form-data">
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" placeholder="Enter asset title" required>
                    <label for="description">Description:</label>
                    <textarea id="description" name="description" rows="5" placeholder="Enter asset description" required></textarea>
                    <label for="price">Price:</label>
                    <input type="number" id="price" name="price" step="0.01" placeholder="Enter price" required>
                    <label for="image">Upload Image:</label>
                    <input type="file" id="image" name="image" required>
                    <button type="submit">Publish</button>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2023 GameAssetHub. All rights reserved by GRANDFLEET.</p>
        </div>
    </footer>
</body>
</html>
