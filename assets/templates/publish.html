{% extends "base.html" %}
{% block title %}Publish Asset - GameAssetHub{% endblock %}
{% block content %}
<section class="publish-section">
    <div class="container">
        <h1>Publish Your Asset</h1>
        <form action="/publish/" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <label for="title">Asset Title:</label>
            <input type="text" id="title" name="title" placeholder="Enter asset title" required>
            
            <label for="description">Description:</label>
            <textarea id="description" name="description" rows="5" placeholder="Enter a detailed description" required></textarea>
            
            <label for="type">Asset Type:</label>
            <select id="type" name="type" required>
                <option value="">Select Type</option>
                <option value="3D">3D Model</option>
                <option value="Textures">Texture</option>
                <option value="Audio">Audio</option>
                <option value="Scripts">Script</option>
                <option value="Animations">Animation</option>
            </select>
            
            <label for="price">Price (USD):</label>
            <input type="number" id="price" name="price" placeholder="Enter price" min="0" step="0.01" required>
            
            <label for="file">Upload File:</label>
            <input type="file" id="file" name="file" required>
            
            <button type="submit" class="button">Publish Asset</button>
        </form>
    </div>
</section>
{% endblock %}
