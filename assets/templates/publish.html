{% extends 'base.html' %}
{% block title %}Publish - GameAssetHub{% endblock %}
{% block content %}
<section class="publish">
    <div class="container">
        <h1>Publish Your Assets</h1>
        <form action="#" method="post" enctype="multipart/form-data">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" placeholder="Enter asset title" required>
            <label for="description">Description:</label>
            <textarea id="description" name="description" rows="5" placeholder="Enter asset description" required></textarea>
            <label for="price">Price:</label>
            <input type="number" id="price" name="price" step="0.01" placeholder="Enter price" required>
            <label for="image">Upload Image:</label>
            <input type="file" id="image" name="image" required>
            <button type="submit">Publish</button>
        </form>
    </div>
</section>
{% endblock %}
